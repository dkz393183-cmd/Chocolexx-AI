<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chocolexx AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="choco-icon">🍫</span>
        <h1>Chocolexx <span>AI</span></h1>
      </div>
      <p class="tagline">Sua inteligência artificial com sabor especial</p>
    </header>

    <div class="mode-buttons">
      <button class="mode-btn active" data-mode="geral" onclick="setMode('geral')">
        🌐 Geral
      </button>
      <button class="mode-btn" data-mode="estudos" onclick="setMode('estudos')">
        📚 Estudos
      </button>
      <button class="mode-btn" data-mode="conversa" onclick="setMode('conversa')">
        💬 Conversa
      </button>
    </div>

    <div class="mode-label" id="modeLabel">Modo: Geral</div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        <span class="avatar">🍫</span>
        <div class="bubble">Olá! Sou a <strong>Chocolexx AI</strong>. Como posso te ajudar hoje?</div>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Digite sua mensagem..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button onclick="sendMessage()">Enviar ➤</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
