<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chocolexx AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍫</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="contextMenu" class="context-menu hidden">
    <div id="ctxRename">✏️ Renomear</div>
    <div id="ctxDelete">🗑️ Deletar</div>
  </div>

  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <div class="login-logo">🍫 <span>Chocolexx AI</span></div>
      <p>Entre para começar a conversar</p>
      <button id="googleLoginBtn" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"/> Entrar com Google
      </button>
    </div>
  </div>

  <div id="appScreen" class="app-screen hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="logo-small">🍫 Chocolexx AI</span>
        <button id="newChatBtn" class="btn-new-chat">+ Novo chat</button>
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-footer">
        <img id="userAvatar" src="" width="32" height="32" />
        <span id="userName"></span>
        <button id="logoutBtn" class="btn-logout">Sair</button>
      </div>
    </div>

    <div class="main">
      <div class="top-bar">
        <div class="mode-buttons">
          <button class="mode-btn active" data-mode="geral" onclick="setMode('geral')">🌐 Geral</button>
          <button class="mode-btn" data-mode="estudos" onclick="setMode('estudos')">📚 Estudos</button>
          <button class="mode-btn" data-mode="conversa" onclick="setMode('conversa')">💬 Conversa</button>
        </div>
      </div>

      <div class="chat-box" id="chatBox">
        <div class="welcome">
          <div class="welcome-logo">🍫</div>
          <h2>Como posso te ajudar?</h2>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="userInput" placeholder="Mensagem para Chocolexx AI..." onkeydown="if(event.key==='Enter') sendMessage()" />
        </div>
        <button class="btn-img" onclick="generateImage()" title="Gerar imagem">🎨</button>
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAz2HjRtlWBjFCx4146lZM5yt-Y1lJWUbw",
      authDomain: "chocolexx-ai.firebaseapp.com",
      projectId: "chocolexx-ai",
      storageBucket: "chocolexx-ai.firebasestorage.app",
      messagingSenderId: "196073489923",
      appId: "1:196073489923:web:2fc5f45bf2f5cb952ff036"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentChatId = null;
    let currentMessages = [];

    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userAvatar').src = user.photoURL;
        loadChats();
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('appScreen').classList.add('hidden');
      }
    });

    document.getElementById('googleLoginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    document.getElementById('newChatBtn').onclick = () => newChat();

    async function newChat() {
      const ref = await addDoc(collection(db, 'users', currentUser.uid, 'chats'), {
        title: 'Novo chat',
        createdAt: Date.now()
      });
      currentChatId = ref.id;
      currentMessages = [];
      renderChatBox([]);
      loadChats();
    }

    async function loadChats() {
      const q = query(collection(db, 'users', currentUser.uid, 'chats'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      const list = document.getElementById('chatList');
      list.innerHTML = '';
      snap.forEach(d => {
        const div = document.createElement('div');
        div.className = 'chat-item' + (d.id === currentChatId ? ' active' : '');
        div.textContent = d.data().title;
        div.onclick = () => openChat(d.id);
        div.oncontextmenu = (e) => showContextMenu(e, d.id);
        list.appendChild(div);
      });
    }

    async function openChat(chatId) {
      currentChatId = chatId;
      const q = query(collection(db, 'users', currentUser.uid, 'chats', chatId, 'messages'), orderBy('createdAt'));
      const snap = await getDocs(q);
      currentMessages = [];
      snap.forEach(d => currentMessages.push({role: d.data().role, content: d.data().content}));
      renderChatBox(currentMessages);
      loadChats();
    }

    function renderChatBox(messages) {
      const box = document.getElementById('chatBox');
      box.innerHTML = '';
      if (messages.length === 0) {
        box.innerHTML = '<div class="welcome"><div class="welcome-logo">🍫</div><h2>Como posso te ajudar?</h2></div>';
        return;
      }
      messages.forEach(m => appendBubble(m.role, m.content));
    }

    function appendBubble(role, text) {
      const box = document.getElementById('chatBox');
      const welcome = box.querySelector('.welcome');
      if (welcome) welcome.remove();
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'bot'}`;
      div.innerHTML = `<div class="bubble">${text}</div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    window.sendMessage = async function() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text || !currentUser) return;
      
      input.value = '';
      if (!currentChatId) await newChat();

      // Detecta se quer imagem por texto
      const imageKeywords = /^(gere|gera|crie|cria|desenhe|desenha|faça|faz|make|generate|draw|create).*imagem/i;
      if (imageKeywords.test(text)) {
          return window.generateImage(text);
      }

      await addDoc(collection(db, 'users', currentUser.uid, 'chats', currentChatId, 'messages'), {
        role: 'user', content: text, createdAt: Date.now()
      });
      currentMessages.push({ role: 'user', content: text });
      appendBubble('user', text);

      const typingId = addTyping();

      try {
        const res = await fetch('https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json', 
            'Authorization': `Bearer ${window.GROQ_KEY}` 
          },
          body: JSON.stringify({ 
            model: 'llama-3.3-70b-versatile', 
            messages: [{ role: 'system', content: window.currentSystemPrompt }, ...currentMessages] 
          })
        });
        
        const data = await res.json();
        removeTyping(typingId);

        if (data.choices) {
          const reply = data.choices[0].message.content;
          await addDoc(collection(db, 'users', currentUser.uid, 'chats', currentChatId, 'messages'), {
            role: 'assistant', content: reply, createdAt: Date.now()
          });
          currentMessages.push({ role: 'assistant', content: reply });
          appendBubble('bot', reply);
        }
      } catch(e) {
        removeTyping(typingId);
        appendBubble('bot', 'Aguardando liberação da chave do Google ou erro de rede escolar.');
      }
    };

    window.generateImage = async function(customText) {
      const input = document.getElementById('userInput');
      const text = customText || input.value.trim();
      if (!text || !currentUser) return;
      
      input.value = '';
      if (!currentChatId) await newChat();

      appendBubble('user', `🎨 Gerando arte para: ${text}`);
      const typingId = addTyping();

      const seed = Math.floor(Math.random() * 1000);
      const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=512&height=512&nologo=true&seed=${seed}`;
      const imgHtml = `<img src="${imgUrl}" alt="Arte: ${text}" style="max-width:100%; border-radius:12px; margin-top:10px; border: 2px solid #5c2d0e;" onerror="this.src='https://via.placeholder.com/512?text=Erro+ao+carregar+imagem'">`;

      setTimeout(async () => {
        removeTyping(typingId);
        appendBubble('bot', `Aqui está sua arte:<br>${imgHtml}`);
        
        await addDoc(collection(db, 'users', currentUser.uid, 'chats', currentChatId, 'messages'), {
          role: 'assistant', content: imgHtml, createdAt: Date.now()
        });
      }, 2500);
    };

    function addTyping() {
      const box = document.getElementById('chatBox');
      const id = 'typing-' + Date.now();
      const div = document.createElement('div');
      div.className = 'message bot typing';
      div.id = id;
      div.innerHTML = `<div class="bubble">...</div>`;
      box.appendChild(div);
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // CONTEXT MENU
    let ctxChatId = null;
    const ctxMenu = document.getElementById('contextMenu');
    document.addEventListener('click', () => ctxMenu.classList.add('hidden'));
    function showContextMenu(e, id) {
      e.preventDefault();
      ctxChatId = id;
      ctxMenu.style.left = e.pageX + 'px';
      ctxMenu.style.top = e.pageY + 'px';
      ctxMenu.classList.remove('hidden');
    }
    document.getElementById('ctxRename').onclick = async () => {
      const n = prompt('Novo nome:');
      if(n) { await updateDoc(doc(db, 'users', currentUser.uid, 'chats', ctxChatId), {title: n}); loadChats(); }
    };
    document.getElementById('ctxDelete').onclick = async () => {
      await deleteDoc(doc(db, 'users', currentUser.uid, 'chats', ctxChatId)); loadChats();
    };
  </script>
  <script src="script.js"></script>
</body>
</html>
